name: Terraform DevSecOps Pipeline
on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      environment:
        description: 'Select the environment'
        required: true
        default: 'dev'
      action:
        description: 'Select the action to perform'
        required: true
        default: 'apply'
permissions:
  id-token: write    # Allow the workflow to request an OIDC token
  contents: read     # Allow the workflow to read repository code

env:
  ENV: ${{ github.event.inputs.environment  || 'dev'}}  # Set environment variable based on user input
  ACTION: ${{ github.event.inputs.action || 'apply'}}   # Set action variable based on user input

jobs:
  terraform-plan:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Configure AWS credentials                  # Handles AWS login using OIDC and the specified role
        uses: aws-actions/configure-aws-credentials@v1
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ap-south-1

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@v1

      - name: Terraform Init
        working-directory: terraform/live/dev
        run: terraform init

      - name: Terraform Validate
        working-directory: terraform/live/dev
        run: terraform validate
      
      - name: Run Checkov
        uses: bridgecrewio/checkov-action@v12
        with:
          directory: terraform/live/dev
          framework: terraform
          quiet: true
          skip_check: CKV_AWS_144,CKV2_AWS_62,CKV2_AWS_64

      - name: Terraform Plan
        working-directory: terraform/live/dev
        run: terraform plan -var-file=dev.tfvars -out=tfplan
  
  terraform-apply:
    name: Terraform Apply/Destroy
    needs: terraform-plan
    runs-on: ubuntu-latest
    if: ${{ github.event_name == 'workflow_dispatch' }}  # Only run apply on manual trigger
    environment: ${{ env.ENV }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v1
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ap-south-1

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@v1

      - name: Terraform Init
        working-directory: terraform/live/${{ env.ENV }}
        run: terraform init

      - name: Terraform Apply
        if: ${{ env.ACTION == 'apply' }}
        working-directory: terraform/live/${{ env.ENV }}
        run: terraform apply -auto-approve -var-file=${{ env.ENV }}.tfvars

      - name: Terraform Destroy
        if: ${{ env.ACTION == 'destroy' }}
        working-directory: terraform/live/${{ env.ENV }}
        run: terraform destroy -auto-approve -var-file=${{ env.ENV }}.tfvars